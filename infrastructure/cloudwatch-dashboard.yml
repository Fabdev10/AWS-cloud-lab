AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch dashboard for AWS Cloud Lab ECS service.

Parameters:
  DashboardName:
    Type: String
    Default: aws-cloud-lab-overview
    Description: Name of the CloudWatch dashboard.
  ClusterName:
    Type: String
    Description: ECS cluster name created by AWS Copilot.
  ServiceName:
    Type: String
    Description: ECS service name created by AWS Copilot.
  LogGroupName:
    Type: String
    Description: CloudWatch log group name for the service.

Resources:
  CloudLabDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "ECS Service CPU Utilization",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "stat": "Average",
                "period": 300,
                "metrics": [
                  [ "AWS/ECS", "CPUUtilization", "ClusterName", "${ClusterName}", "ServiceName", "${ServiceName}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "ECS Service Memory Utilization",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "stat": "Average",
                "period": 300,
                "metrics": [
                  [ "AWS/ECS", "MemoryUtilization", "ClusterName", "${ClusterName}", "ServiceName", "${ServiceName}" ]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "ALB Request Count (sum)",
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "stat": "Sum",
                "period": 300,
                "metrics": [
                  [ "AWS/ApplicationELB", "RequestCount" ]
                ]
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Recent Application Logs",
                "region": "${AWS::Region}",
                "query": "SOURCE '${LogGroupName}' | fields @timestamp, @message | sort @timestamp desc | limit 50",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: CloudWatch dashboard name.
    Value: !Ref CloudLabDashboard
