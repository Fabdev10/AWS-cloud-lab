AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for the AWS Cloud Lab portfolio project.

Parameters:
  ProjectName:
    Type: String
    Default: aws-cloud-lab
  EnvironmentName:
    Type: String
    Default: production

Resources:
  PortfolioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${EnvironmentName}-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  BucketName:
    Description: Name of the portfolio bucket.
    Value: !Ref PortfolioBucket
  BucketArn:
    Description: ARN of the portfolio bucket.
    Value: !GetAtt PortfolioBucket.Arn
