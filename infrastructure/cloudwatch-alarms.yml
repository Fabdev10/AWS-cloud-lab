AWSTemplateFormatVersion: '2010-09-09'
Description: Example CloudWatch alarm for AWS Cloud Lab ECS service CPU utilization.

Parameters:
  ClusterName:
    Type: String
    Description: ECS cluster name created by AWS Copilot.
  ServiceName:
    Type: String
    Description: ECS service name created by AWS Copilot.
  AlarmTopicArn:
    Type: String
    Default: ''
    Description: Optional SNS topic ARN for alarm notifications.

Conditions:
  HasAlarmTopic: !Not [!Equals [!Ref AlarmTopicArn, '']]

Resources:
  HighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Trigger when ECS service CPU exceeds 70 percent for 10 minutes.
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
        - Name: ServiceName
          Value: !Ref ServiceName
      AlarmActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmTopic, [!Ref AlarmTopicArn], !Ref 'AWS::NoValue']

Outputs:
  CpuAlarmName:
    Description: Name of the CPU alarm.
    Value: !Ref HighCpuAlarm
