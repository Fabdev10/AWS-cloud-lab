name: frontend
type: Load Balanced Web Service

image:
  build: Dockerfile
  port: 8080

http:
  path: '/'
  healthcheck:
    path: '/health'
    success_codes: '200'
    healthy_threshold: 2
    unhealthy_threshold: 3
    interval: 15s
    timeout: 10s

cpu: 256
memory: 512
count: 1
exec: true

variables:
  LOG_LEVEL: INFO
  S3_BUCKET: aws-cloud-lab-production-ACCOUNT-ID-REGION

environments:
  production:
    count: 1
    variables:
      LOG_LEVEL: INFO
